
<!DOCTYPE html>
<html lang="pl"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Moja Kolekcja Monet NBP</title>
<link rel="stylesheet" href="css/style.css">
</head><body>
<header><h1>🪙 Moja Kolekcja Monet NBP</h1></header>
<div class="stats">
<div class="stat"><h3 id="liczba">29</h3>Monet</div>
<div class="stat"><h3>1995-2017</h3>Lata emisji</div>
</div>
<div id="content"></div>
<script>
fetch('data/monety.json')
.then(r=>r.json())
.then(monety=>{
const serie={};
monety.forEach(m=>{
 if(!serie[m.seria]) serie[m.seria]=[];
 serie[m.seria].push(m);
});
let html='';
for(const [seria,lista] of Object.entries(serie)){
 html+=`<h2>${seria} (${lista.length})</h2><div class="grid">`;
 lista.forEach(m=>{
  html+=`<div class="card">
  <div class="images">
  <div class="placeholder">AWERS</div>
  <div class="placeholder">REWERS</div>
  </div>
  <h3>${m.nazwa}</h3>
  <p>Rok: ${m.rok}</p>
  <p>Nominał: 20 zł</p>
  <button>Edytuj</button>
  </div>`;
 });
 html+='</div>';
}
document.getElementById('content').innerHTML=html;
});
</script>
</body></html>
