<!doctype html><html lang='pl'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><link rel='stylesheet' href='css/style.css'><title>Kolekcja</title></head><body>
<div class='layout'>
<div class='sidebar'><h2>🪙 Kolekcja</h2><div id='serie'></div></div>
<div class='main'>
<div class='stats'><div class='stat'><h2>29</h2>Monet</div><div class='stat'><h2>1995-2017</h2>Lata emisji</div></div>
<p><input id='search' placeholder='Szukaj monety...'></p>
<div id='content'></div>
</div></div>
<script>
let all=[]; let active='';
fetch('data/monety.json').then(r=>r.json()).then(d=>{all=d;render();});
document.getElementById('search').oninput=render;
function render(){
 let q=document.getElementById('search').value.toLowerCase();
 let series={}; all.forEach(m=>{if(active && m.seria!=active)return; if(!m.nazwa.toLowerCase().includes(q))return; (series[m.seria]??=[]).push(m)});
 let shtml=''; let counts={}; all.forEach(m=>counts[m.seria]=(counts[m.seria]||0)+1);
 for(let k in counts){shtml+=`<div class="series" onclick="active='${k}';render()">${k} (${counts[k]})</div>`}
shtml+='<div class="series" onclick="active=&quot;&quot;;render()">Wszystkie</div>';
 let h=''; for(let k in series){h+=`<div class='group'><h2>${k}</h2><div class='cards'>`; series[k].forEach(m=>{
 h+=`<div class='card'><div class='images'><div class='imgbox'>AWERS</div><div class='imgbox'>REWERS</div></div><h3>${m.nazwa}</h3><p>Rok: ${m.rok}</p><p>Nominał: 20 zł</p><button>Edytuj</button></div>`}); h+='</div></div>';}
 document.getElementById('content').innerHTML=h;
}
</script></body></html>
