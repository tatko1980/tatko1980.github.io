<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Kolekcja Monet</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>Kolekcje</h2>

        <div class="menu-title">Monety 20 zł</div>
        <div class="series-group">
            <div class="series">Moneta A</div>
            <div class="series">Moneta B</div>
            <div class="series">Moneta C</div>
        </div>

        <div class="menu-title">Monety 10 zł</div>
        <div class="series-group">
            <div class="series">Moneta X</div>
            <div class="series">Moneta Y</div>
        </div>

        <div class="menu-title">Serie specjalne</div>
        <div class="series-group">
            <div class="series">Złote</div>
            <div class="series">Srebrne</div>
        </div>

    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="group">
            <h2>Monety</h2>

            <div class="cards">

                <div class="card">
                    <div class="images">
                        <div class="imgbox">Obraz 1</div>
                        <div class="imgbox">Obraz 2</div>
                    </div>
                    <h3>Moneta A</h3>
                    <p>Opis monety</p>
                    <button>Zobacz</button>
                </div>

                <div class="card">
                    <div class="images">
                        <div class="imgbox">Obraz 1</div>
                        <div class="imgbox">Obraz 2</div>
                    </div>
                    <h3>Moneta B</h3>
                    <p>Opis monety</p>
                    <button>Zobacz</button>
                </div>

                <div class="card">
                    <div class="images">
                        <div class="imgbox">Obraz 1</div>
                        <div class="imgbox">Obraz 2</div>
                    </div>
                    <h3>Moneta C</h3>
                    <p>Opis monety</p>
                    <button>Zobacz</button>
                </div>

            </div>
        </div>

    </div>

</div>

<!-- JS -->
<script>
document.querySelectorAll('.menu-title').forEach(item => {
    item.addEventListener('click', () => {
        item.classList.toggle('open');
    });
});

document.querySelectorAll('.series').forEach(item => {
    item.addEventListener('click', () => {
        document.querySelectorAll('.series').forEach(el => {
            el.classList.remove('active');
        });
        item.classList.add('active');
    });
});
</script>

</body>
</html>
