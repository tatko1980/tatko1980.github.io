<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moja Kolekcja Monet</title>

<style>
body{
font-family:Arial,sans-serif;
max-width:1200px;
margin:auto;
padding:20px;
background:#f4f4f4;
}

h1{
text-align:center;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:8px;
margin:5px 0;
box-sizing:border-box;
}

button{
padding:10px 15px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ccc;
padding:8px;
}

img{
max-width:100px;
max-height:100px;
}
</style>
</head>

<body>

<h1>🪙 Moja Kolekcja Monet</h1>

<div class="card">
<h3>Dodaj monetę</h3>

<input id="kraj" placeholder="Kraj">
<input id="nominal" placeholder="Nominał">
<input id="rok" placeholder="Rok">
<input id="stan" placeholder="Stan">
<textarea id="uwagi" placeholder="Uwagi"></textarea>

<label>Awers:</label>
<input type="file" id="awers">

<label>Rewers:</label>
<input type="file" id="rewers">

<button onclick="dodajMonete()">Dodaj monetę</button>
</div>

<div class="card">
<h3>Wyszukiwanie</h3>
<input id="szukaj" placeholder="Szukaj..." onkeyup="wyswietlMonety()">
</div>

<div class="card">
<h3>Liczba monet: <span id="licznik">0</span></h3>
</div>

<table>
<thead>
<tr>
<th>Awers</th>
<th>Rewers</th>
<th>Kraj</th>
<th>Nominał</th>
<th>Rok</th>
<th>Stan</th>
<th>Uwagi</th>
<th>Usuń</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<script>

let monety = JSON.parse(localStorage.getItem("monety")) || [];

function zapisz(){
localStorage.setItem("monety", JSON.stringify(monety));
}

function dodajMonete(){

const plik=document.getElementById("zdjecie").files[0];

if(plik){

const reader=new FileReader();

reader.onload=function(e){

monety.push({
kraj:document.getElementById("kraj").value,
nominal:document.getElementById("nominal").value,
rok:document.getElementById("rok").value,
stan:document.getElementById("stan").value,
uwagi:document.getElementById("uwagi").value,
zdjecie:e.target.result
});

zapisz();
wyswietlMonety();
};

reader.readAsDataURL(plik);

}else{

monety.push({
kraj:document.getElementById("kraj").value,
nominal:document.getElementById("nominal").value,
rok:document.getElementById("rok").value,
stan:document.getElementById("stan").value,
uwagi:document.getElementById("uwagi").value,
zdjecie:""
});

zapisz();
wyswietlMonety();
}
}

function usun(index){
monety.splice(index,1);
zapisz();
wyswietlMonety();
}

function wyswietlMonety(){

const szukaj=document.getElementById("szukaj").value.toLowerCase();

let html="";

monety.forEach((m,index)=>{

const tekst=(m.kraj+" "+m.nominal+" "+m.rok).toLowerCase();

if(!tekst.includes(szukaj)) return;

html+=`
<tr><td>${m.awers ? `<img src="${m.awers}">` : ''}</td>
<td>${m.rewers ? `<img src="${m.rewers}">` : ''}</td>
<td>${m.kraj}</td>
<td>${m.nominal}</td>
<td>${m.rok}</td>
<td>${m.stan}</td>
<td>${m.uwagi}</td>
<td><button onclick="usun(${index})">X</button></td>
</tr>
`;
});

document.getElementById("tabela").innerHTML=html;
document.getElementById("licznik").innerText=monety.length;
}

wyswietlMonety();

</script>

</body>
</html>
