<!doctype html><html lang='pl'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><link rel='stylesheet' href='css/style.css'><title>Kolekcja</title></head><body>
<div class='layout'>
<div class='sidebar'><h2>🪙 Kolekcja</h2><div id='serie'></div></div>
<div class='main'>
<div class='stats'><div class='stat'><h2>29</h2>Monet</div><div class='stat'><h2>1995-2017</h2>Lata emisji</div></div>
<p><input id='search' placeholder='Szukaj monety...'></p>
<div id='content'></div>
</div></div>
<script>
let all=[];
let active='';
let notes=JSON.parse(localStorage.getItem('notes')||'{}');
fetch('data/monety.json').then(r=>r.json()).then(d=>{all=d;render();});
document.getElementById('search').oninput=render;
function render(){
 let q=document.getElementById('search').value.toLowerCase();
 let series={}; all.forEach(m=>{if(active && m.seria!=active)return; if(!m.nazwa.toLowerCase().includes(q))return; (series[m.seria]??=[]).push(m)});
 let shtml=''; let counts={}; all.forEach(m=>counts[m.seria]=(counts[m.seria]||0)+1);
 let allClass = active===''
  ? 'series active'
  : 'series';

shtml += `
  <div class="${allClass}" onclick="active='';render()">
    Wszystkie
  </div>
`;

for(let k in counts){

  let cls = active===k
    ? "series active"
    : "series";

  shtml += `
    <div class="${cls}" onclick="active='${k}';render()">
      ${k} (${counts[k]})
    </div>
  `;
}

document.getElementById('serie').innerHTML = shtml;

let h='';

for(let k in series){

  h += `<div class='group'>
          <h2>${k}</h2>
          <div class='cards'>`;

  series[k].forEach(m => {

    h += `
      <div class='card'>

        <div class='images'>

          <div class='imgbox'>
            ${
              m.awers
              ? `<img src="${m.awers}" class="coinimg"
onclick="openViewer('${m.awers}')">`
              : `AWERS`
            }
          </div>

          <div class='imgbox'>
            ${
              m.rewers
              ? `<img src="${m.rewers}" class="coinimg"
onclick="openViewer('${m.rewers}')">`
              : `REWERS`
            }
          </div>

        </div>

        <h3>${m.nazwa}</h3>

        <p><strong>Rok:</strong> ${m.rok}</p>
        <p><strong>Nominał:</strong> 20 zł</p>
        <p><strong>Stan:</strong> ${notes[m.nazwa]?.stan || '-'}</p>

        <button onclick="editCoin('${m.nazwa}')">
          Edytuj
        </button>

      </div>
    `;

  });

  h += `</div></div>`;
}

document.getElementById('content').innerHTML = h;
}
 function openViewer(src){
  document.getElementById('viewerImg').src = src;
  document.getElementById('viewer').style.display = 'flex';
}

function closeViewer(){
  document.getElementById('viewer').style.display = 'none';
}
 function editCoin(name){

  let current = notes[name] || {
    stan:'',
    notatka:''
  };

  let stan = prompt(
    'Stan monety:',
    current.stan
  );

  if(stan===null) return;
  let notatka = prompt(
    'Notatki:',
    current.notatka
  );

  if(notatka===null) return;

  notes[name]={
    stan,
    notatka
  };

  localStorage.setItem(
    'notes',
    JSON.stringify(notes)
  );

  alert('Zapisano');
}
</script>

<div id="viewer" class="viewer" onclick="closeViewer()">
  <img id="viewerImg">
</div>

</body>
</html>
