ąp zawartość pliku index.html tym kodem:

<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moja Kolekcja Monet</title>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 1000px;
    margin: 20px auto;
    padding: 20px;
    background: #f5f5f5;
}

h1 {
    text-align: center;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    border: 1px solid #ccc;
    padding: 10px;
    text-align: left;
}

th {
    background: #e8e8e8;
}

tr:hover {
    background: #f0f8ff;
}
</style>
</head>

<body>

<h1>🪙 Moja Kolekcja Monet</h1>

<table>
    <tr>
        <th>Kraj</th>
        <th>Nominał</th>
        <th>Rok</th>
        <th>Stan</th>
        <th>Uwagi</th>
    </tr>

    <tr>
        <td>Polska</td>
        <td>2 zł</td>
        <td>2000</td>
        <td>Bardzo dobry</td>
        <td>Moneta okolicznościowa</td>
    </tr>

    <tr>
        <td>Niemcy</td>
        <td>1 Euro</td>
        <td>2002</td>
        <td>Doskonały</td>
        <td>Pierwsza moneta euro</td>
    </tr>

</table>

</body>
</html>
